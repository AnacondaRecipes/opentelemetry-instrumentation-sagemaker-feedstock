{% set name = "opentelemetry-instrumentation-sagemaker" %}
{% set version = "0.57.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 69dad6b708e23baa6ad4b6b9c31bd7f5da86832b46895e5a6fac3a2ad0c9075d

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<310]

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - opentelemetry-api >=1.38.0,<2.0.0
    - opentelemetry-instrumentation >=0.59b0
    - opentelemetry-semantic-conventions >=0.59b0
    - opentelemetry-semantic-conventions-ai <0.6.0,>=0.5
  run_constrained:
    - boto3 >=1.34.120,<2.0.0

# Tests disabled, need token authentication:
# E   botocore.exceptions.ClientError: An error occurred (UnrecognizedClientException) when calling the InvokeEndpoint operation: The security token included in the request is invalid.
test:
  imports:
    - opentelemetry.instrumentation.sagemaker
  commands:
    - pip check
  requires:
    - pip
    - boto3 >=1.34.120,<2.0.0

about:
  home: https://www.traceloop.com/openllmetry
  dev_url: https://github.com/traceloop/openllmetry
  doc_url: https://www.traceloop.com/docs/openllmetry/introduction
  summary: OpenTelemetry SageMaker instrumentation
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  description: |
    This library allows tracing of any models deployed on Amazon SageMaker and invoked with Boto3 to SageMaker.

extra:
  recipe-maintainers:
    - timkpaine
  skip-lints:
    - invalid_url